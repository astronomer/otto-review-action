name: "Otto Review"
description: "Use Astronomer's Otto data engineering agent to review pull requests."
author: "Astronomer"
branding:
  icon: "git-pull-request"
  color: "purple"
inputs:
  astro-api-token:
    required: false
    default: ""
    description: "Astronomer API token used to authenticate Otto against the Astronomer Gateway. If empty, the action falls back to the ASTRO_API_TOKEN env var."
  astro-domain:
    required: false
    default: "astronomer.io"
    description: "Astronomer domain. Defaults to 'astronomer.io'. Override for non-prod environments (e.g. 'astronomer-dev.io')."
  astro-organization:
    required: false
    default: ""
    description: "Astronomer organization ID for gateway routing. If empty, the action falls back to the ASTRO_ORGANIZATION env var."
  github-token:
    required: false
    default: ${{ github.token }}
    description: "GitHub token used to read PR metadata and post the review. Defaults to the workflow's GITHUB_TOKEN."
  resolve-token:
    required: false
    default: ""
    description: "Optional token used for the resolveReviewThread GraphQL mutation. After posting a new review, the action resolves any prior threads the reviewer agent flagged as addressed (verdict.resolved_thread_ids). The default GITHUB_TOKEN cannot call this mutation — it returns 'Resource not accessible by integration' even with pull-requests:write — so without an override here those resolutions are skipped with a warning. Provide a PAT or GitHub App installation token with pull_requests:write to apply them. The token is only used for thread resolution; review posting still goes through 'github-token'."
  astro-cli-version:
    required: false
    default: ""
    description: "Astro CLI version to install. Otto is bundled with the Astro CLI and auto-updates independently; this action requires an Otto build that ships the `reviewer` persona. Empty installs the latest published version, which is the recommended setting."
  model:
    required: false
    default: ""
    description: "Model identifier passed to Otto via --model. Empty uses Otto's default."
  max-diff-lines:
    required: false
    default: "50000"
    description: "Maximum number of diff lines passed to Otto. Larger diffs are truncated. Truncation is itself a signal that the PR is too large for an automated review."
  allowed-tools:
    required: false
    default: ""
    description: "Comma-separated list of Otto tools the reviewer may call. Empty (default) uses the reviewer persona's built-in allowlist (read, grep, find, ls, bash). Set this to override with a different list."
  dry-run:
    required: false
    default: "false"
    description: "If 'true', the review event is downgraded to COMMENT regardless of Otto's verdict. Use this while you're tuning the prompt."
  pr-number:
    required: false
    default: ""
    description: "PR number to review. Only consulted for events that don't carry a PR payload (issue_comment, workflow_dispatch, repository_dispatch). For pull_request / pull_request_target events the PR is read from the event payload and this input is ignored."
outputs:
  verdict:
    description: "Otto's verdict ('approve', 'comment', or 'request_changes'). Empty when Otto failed to produce a parseable response."
    value: ${{ steps.post-review.outputs.verdict }}
  summary:
    description: "Otto's one-sentence summary of the PR."
    value: ${{ steps.post-review.outputs.summary }}
  comment-count:
    description: "Number of inline review comments Otto produced."
    value: ${{ steps.post-review.outputs.comment-count }}
  resolved-thread-count:
    description: "Number of prior review threads Otto flagged as addressed (verdict.resolved_thread_ids). The action attempts to resolve each — see 'resolve-token' for the token requirement."
    value: ${{ steps.post-review.outputs.resolved-thread-count }}

runs:
  using: "composite"
  steps:
    - name: Resolve PR context
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        EVENT_ISSUE_IS_PR: ${{ github.event.issue.pull_request != null }}
      run: |
        set -euo pipefail
        # pull_request* events carry the PR coordinates in the payload. Other
        # supported events (issue_comment on a PR, workflow_dispatch,
        # repository_dispatch) need an explicit PR number; we resolve the
        # base/head SHAs from the API. Anything else is rejected loud — we'd
        # rather fail than post a review against the wrong commits.
        case "$GITHUB_EVENT_NAME" in
          pull_request|pull_request_target)
            PR_NUMBER="$EVENT_PR_NUMBER"
            BASE_SHA="$EVENT_BASE_SHA"
            HEAD_SHA="$EVENT_HEAD_SHA"
            ;;
          issue_comment)
            if [[ "$EVENT_ISSUE_IS_PR" != "true" ]]; then
              echo "::error::issue_comment event received but the issue is not a pull request."
              exit 1
            fi
            PR_NUMBER="${INPUT_PR_NUMBER:-$EVENT_ISSUE_NUMBER}"
            ;;
          workflow_dispatch|repository_dispatch)
            if [[ -z "$INPUT_PR_NUMBER" ]]; then
              echo "::error::'pr-number' input is required when otto-review-action runs on '$GITHUB_EVENT_NAME'."
              exit 1
            fi
            PR_NUMBER="$INPUT_PR_NUMBER"
            ;;
          *)
            echo "::error::otto-review-action does not support the '$GITHUB_EVENT_NAME' event."
            exit 1
            ;;
        esac

        if [[ -z "${BASE_SHA:-}" || -z "${HEAD_SHA:-}" ]]; then
          json=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefOid,headRefOid)
          BASE_SHA=$(jq -r '.baseRefOid' <<<"$json")
          HEAD_SHA=$(jq -r '.headRefOid' <<<"$json")
        fi

        {
          echo "pr-number=$PR_NUMBER"
          echo "base-sha=$BASE_SHA"
          echo "head-sha=$HEAD_SHA"
        } >> "$GITHUB_OUTPUT"

    - name: Checkout PR head
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.resolve.outputs.head-sha }}
        # Full history so `git diff base..head` works locally without an extra
        # fetch. PRs from forks are checked out by SHA; the workflow's
        # permissions decide whether secrets are available, not this step.
        fetch-depth: 0
        token: ${{ inputs.github-token }}

    - name: Resolve auth inputs
      id: auth
      shell: bash
      env:
        INPUT_ASTRO_API_TOKEN: ${{ inputs.astro-api-token }}
        INPUT_ASTRO_DOMAIN: ${{ inputs.astro-domain }}
        INPUT_ASTRO_ORGANIZATION: ${{ inputs.astro-organization }}
      run: |
        # Otto reads ASTRO_TOKEN / ASTRO_DOMAIN / ASTRO_ORGANIZATION from env.
        # Accept either the action input or a pre-set env var so the simple
        # `env: { ASTRO_API_TOKEN: ... }` workflow form keeps working.
        TOKEN="${INPUT_ASTRO_API_TOKEN:-${ASTRO_API_TOKEN:-}}"
        DOMAIN="${INPUT_ASTRO_DOMAIN:-${ASTRO_DOMAIN:-astronomer.io}}"
        ORG="${INPUT_ASTRO_ORGANIZATION:-${ASTRO_ORGANIZATION:-}}"

        if [[ -z "$TOKEN" ]]; then
          echo "::error::No Astronomer API token. Set the ASTRO_API_TOKEN env var or the 'astro-api-token' input."
          exit 1
        fi
        if [[ -z "$ORG" ]]; then
          echo "::error::No Astronomer organization. Set the ASTRO_ORGANIZATION env var or the 'astro-organization' input."
          exit 1
        fi

        # Mask the token even if the user passed it via input. GITHUB_TOKEN-style
        # secrets are masked automatically; user inputs are not.
        echo "::add-mask::$TOKEN"

        # Echo into GITHUB_ENV so subsequent steps inherit them, and into the
        # step output for traceability (domain/org are not secret).
        {
          echo "ASTRO_TOKEN=$TOKEN"
          echo "ASTRO_DOMAIN=$DOMAIN"
          echo "ASTRO_ORGANIZATION=$ORG"
        } >> "$GITHUB_ENV"
        echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
        echo "organization=$ORG" >> "$GITHUB_OUTPUT"

    - name: Install Astro CLI
      # Otto is bundled with the Astro CLI, so the only supported install path
      # is the CLI. This action additionally needs a build that ships the
      # `reviewer` persona; the next step verifies that and fails loud if it
      # is missing. Defer to setup-astro-cli for the actual download — it
      # handles platform detection, version pinning, and the "already
      # installed" fast-path.
      id: install
      uses: astronomer/setup-astro-cli@v0.0.1
      with:
        version: ${{ inputs.astro-cli-version }}

    - name: Verify Otto is bundled
      id: verify
      shell: bash
      env:
        CLI_VERSION: ${{ steps.install.outputs.cli-version }}
        CLI_PATH: ${{ steps.install.outputs.cli-path }}
      run: |
        echo ::group::Verify Otto
        # Sanity-check that this CLI knows about `otto`. Older versions silently
        # accept unknown subcommands and exit zero, so we look for "otto" in
        # `astro --help`. Fail loud if it isn't there — running blind would
        # produce a confusing "no diff posted" outcome instead of an actionable
        # error.
        if ! "$CLI_PATH" --help 2>&1 | grep -qiE '^\s*otto\b'; then
          echo "::error::Astro CLI ${CLI_VERSION} at ${CLI_PATH} does not bundle Otto. Otto requires Astro CLI >= 1.42.0. Set the 'astro-cli-version' input to '1.42.0' or newer."
          exit 1
        fi
        # Also check the bundled Otto knows about the `reviewer` persona. The
        # action no longer ships its own system prompt + verdict schema — both
        # come from the persona. An Otto build without it would error out at
        # runtime; fail here with an actionable message.
        if ! "$CLI_PATH" otto --help 2>&1 | grep -qE '\breviewer\b'; then
          echo "::error::Astro CLI ${CLI_VERSION} bundles Otto but not the 'reviewer' persona. Update to a newer Otto build (Otto auto-updates on first 'astro otto' invocation; clear ~/.astro/bin/otto if it appears stuck)."
          exit 1
        fi
        echo "Astro CLI ${CLI_VERSION} bundles Otto with the reviewer persona."
        echo ::endgroup::

    - name: Gather PR context
      id: ctx
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.resolve.outputs.pr-number }}
        BASE_SHA: ${{ steps.resolve.outputs.base-sha }}
        HEAD_SHA: ${{ steps.resolve.outputs.head-sha }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
      run: bash "$GITHUB_ACTION_PATH/scripts/gather-context.sh"

    - name: Build prompt
      id: prompt
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$GITHUB_ACTION_PATH/scripts/build-prompt.sh"

    - name: Run Otto review
      id: otto
      shell: bash
      env:
        # Otto reads these for gateway auth (set by the auth step above).
        ASTRO_TOKEN: ${{ env.ASTRO_TOKEN }}
        ASTRO_DOMAIN: ${{ env.ASTRO_DOMAIN }}
        ASTRO_ORGANIZATION: ${{ env.ASTRO_ORGANIZATION }}
        # Override Otto's default LLM-gateway attribution headers so review
        # traffic bills as this action, not as bare "otto". The version is
        # the ref the workflow pinned us to (tag like "v0.0.1", branch like
        # "main", or a commit SHA) — never empty for composite actions.
        OTTO_X_ASTRO_CLIENT_IDENTIFIER: otto-review-action
        OTTO_X_ASTRO_CLIENT_VERSION: ${{ github.action_ref }}
        # GitHub token is intentionally NOT exposed to Otto. The review is
        # posted by the post-review step under the workflow's permissions.
        ASTRO_CLI_PATH: ${{ steps.install.outputs.cli-path }}
        ACTION_PATH: ${{ github.action_path }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_ALLOWED_TOOLS: ${{ inputs.allowed-tools }}
      run: bash "$GITHUB_ACTION_PATH/scripts/run-otto.sh"

    - name: Dismiss stale otto-reviewer reviews
      # Dismiss / supersede prior top-level reviews this action posted on the
      # same PR, identified by the hidden marker in their body. Runs before
      # the new review is posted so the timeline only shows the freshest
      # verdict. Inline-comment thread resolution is handled in the Post
      # review step, driven by the agent's verdict.
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ steps.resolve.outputs.pr-number }}
      run: bash "$GITHUB_ACTION_PATH/scripts/dismiss-stale.sh"

    - name: Post review
      id: post-review
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        RESOLVE_TOKEN: ${{ inputs.resolve-token }}
        PR_NUMBER: ${{ steps.resolve.outputs.pr-number }}
        BASE_SHA: ${{ steps.resolve.outputs.base-sha }}
        HEAD_SHA: ${{ steps.resolve.outputs.head-sha }}
        VERDICT_FILE: /tmp/otto-review/verdict-raw.txt
        ACTION_PATH: ${{ github.action_path }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: bash "$GITHUB_ACTION_PATH/scripts/post-review.sh"
