name: Release image

# Build and push the GitLab consumer image to GHCR. Fires when a GitHub Release
# is published (the existing release step), tagging the image to match the
# release tag plus the moving major tag. workflow_dispatch builds an arbitrary
# ref/tag — used to seed a pre-release (e.g. v0.0.1-rc1) before the first real
# release so the image-based template can be tested.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag / branch / sha)."
        required: true
        type: string
      tag:
        description: "Version tag to publish (e.g. v0.2.0 or v0.0.1-rc1)."
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push to GHCR via the built-in GITHUB_TOKEN
      id-token: write        # build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # INPUT_TAG comes through env: (never interpolated into the script) so a
          # workflow_dispatch caller can't inject shell, and is shape-checked
          # before use — this runner has packages:write + id-token:write.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if ! printf '%s' "$INPUT_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
              echo "Invalid tag (expected vX.Y.Z or vX.Y.Z-prerelease): $INPUT_TAG" >&2
              exit 1
            fi
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64    # amd64 is native to the runner; only arm64 needs emulation

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/astronomer/otto-review
          # latest=auto (the default, stated explicitly): emit `latest` for a
          # non-prerelease semver, and skip it for prereleases like v0.0.1-rc1.
          flavor: latest=auto
          tags: |
            type=semver,pattern=v{{version}},value=${{ steps.version.outputs.value }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ steps.version.outputs.value }}
            type=semver,pattern=v{{major}},value=${{ steps.version.outputs.value }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OTTO_REVIEW_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/astronomer/otto-review
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
