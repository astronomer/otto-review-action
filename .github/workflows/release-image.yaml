name: Release image

# Build and push the GitLab consumer image to GHCR. Fires when a GitHub Release
# is published (the existing release step), tagging the image to match the
# release tag plus the moving major tag. workflow_dispatch builds an arbitrary
# ref/tag — used to seed a pre-release (e.g. v0.0.1-rc1) before the first real
# release so the image-based template can be tested.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag / branch / sha)."
        required: true
        type: string
      tag:
        description: "Version tag to publish (e.g. v0.2.0 or v0.0.1-rc1)."
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push to GHCR via the built-in GITHUB_TOKEN
      id-token: write        # build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve version and tags
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          IMAGE: ghcr.io/astronomer/otto-review
        run: |
          set -euo pipefail
          # On workflow_dispatch the version is the `tag` input (via env:, never
          # interpolated into the script, so a dispatcher can't inject shell on
          # this packages:write + id-token:write runner). On a published release
          # it's the release tag (github.ref_name).
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_TAG"
          else
            VERSION="$REF_NAME"
          fi
          # Shape-check both sources: guards the dispatch input and a malformed
          # release tag alike.
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Invalid version (expected vX.Y.Z or vX.Y.Z-prerelease): $VERSION"
            exit 1
          fi

          # Derive the moving tags from vX.Y.Z[-pre]. We compute the tag list
          # here rather than via docker/metadata-action's semver patterns because
          # that action drops the leading `v` for prereleases — but consumers pin
          # the v-prefixed `:v0` / `:vX.Y.Z` tags (see gitlab/otto-review.gitlab-ci.yml
          # and the README), so the prefix must be guaranteed.
          base="${VERSION#v}"; base="${base%%-*}"   # X.Y.Z
          major="v${base%%.*}"                      # vX
          minor="v${base%.*}"                       # vX.Y

          # The full version tag always publishes. The moving major/minor/latest
          # tags track GA releases only: a prerelease must not advance :v0 or
          # :latest, or consumers pinned there would jump onto an rc.
          tags=("$IMAGE:$VERSION")
          case "$VERSION" in
            *-*) : ;;  # prerelease — full version tag only
            *)   tags+=("$IMAGE:$minor" "$IMAGE:$major" "$IMAGE:latest") ;;
          esac

          {
            echo "value=$VERSION"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $VERSION; publishing tags:"
          printf '  %s\n' "${tags[@]}"

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64    # amd64 is native to the runner; only arm64 needs emulation

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/astronomer/otto-review
          # Used for OCI labels only; the tag list comes from the step above so
          # the v-prefix is guaranteed. type=raw keeps the version label
          # v-prefixed and matching the published full tag.
          tags: type=raw,value=${{ steps.version.outputs.value }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OTTO_REVIEW_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/astronomer/otto-review
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
