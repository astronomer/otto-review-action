name: E2E - Otto Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - '.github/workflows/e2e-otto-review.yaml'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review."
        required: true
        type: string

concurrency:
  group: e2e-otto-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Exercise both documented auth wirings so neither path can regress
    # unnoticed (issue #23: the input path was broken for months because the
    # e2e only ever supplied the token as a workflow-level env var).
    #   - env:   token via the workflow `env: ASTRO_API_TOKEN` (README quickstart)
    #   - input: token via the `astro-api-token` / `astro-organization` inputs
    # Serialized (max-parallel: 1) so the two legs don't race each other
    # upserting the same PR's sticky comment / inline threads. fail-fast off so
    # one wiring breaking still reports the other's result.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        auth: [env, input]
    env:
      ASTRO_API_TOKEN: ${{ matrix.auth == 'env' && secrets.ASTRO_API_TOKEN || '' }}
      ASTRO_ORGANIZATION: ${{ matrix.auth == 'env' && secrets.ASTRO_ORGANIZATION || '' }}
    # Trigger conditions:
    # - pull_request: same-repo non-draft PRs touching e2e/** or this workflow.
    # - issue_comment: a `/otto-review` comment from someone with write access
    #   (OWNER / MEMBER / COLLABORATOR) on a PR thread.
    # - workflow_dispatch: an explicit run from the Actions UI / `gh workflow
    #   run`, with the PR number passed as input.
    if: >-
      (github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        (github.event.comment.body == '/otto-review' ||
          startsWith(github.event.comment.body, '/otto-review ')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Reject fork PRs reached via issue_comment / workflow_dispatch before we
      # check out the PR head. Without this, a maintainer's `/otto-review` (or
      # any dispatch) on a fork PR would pull fork-author code into `./` and
      # then `uses: ./` would run it with `pull-requests: write` and the Astro
      # secrets in env — the textbook pwn-request pattern. pull_request flows
      # are already gated on head.repo at the job's `if:`.
      - name: Verify PR head is in this repo
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          is_cross=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json isCrossRepository --jq '.isCrossRepository')
          if [[ "$is_cross" != "false" ]]; then
            echo "::error::Refusing to review PR #$PR_NUMBER — its head is in a different repository. Slash-command and workflow_dispatch only support same-repo PRs."
            exit 1
          fi
      # Check out the PR head so the action code under test matches the PR
      # being reviewed. For pull_request the head SHA comes from the event
      # payload; for issue_comment / workflow_dispatch we resolve
      # refs/pull/<n>/head.
      - uses: actions/checkout@v6
        with:
          ref: >-
            ${{
              github.event.pull_request.head.sha ||
              format('refs/pull/{0}/head', github.event.issue.number || inputs.pr_number)
            }}
      - name: Otto Review
        uses: ./
        with:
          dry-run: "true"
          pr-number: ${{ github.event.issue.number || inputs.pr_number }}
          # On the 'input' leg, supply auth through the action inputs and leave
          # the env vars unset (see job `env:` above) so this run authenticates
          # purely off the input path. On the 'env' leg these resolve to '' and
          # the action falls back to the env vars.
          astro-api-token: ${{ matrix.auth == 'input' && secrets.ASTRO_API_TOKEN || '' }}
          astro-organization: ${{ matrix.auth == 'input' && secrets.ASTRO_ORGANIZATION || '' }}
