name: E2E - Otto Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - '.github/workflows/e2e-otto-review.yaml'
  workflow_dispatch:

concurrency:
  group: e2e-otto-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
  ASTRO_ORGANIZATION: ${{ secrets.ASTRO_ORGANIZATION }}

jobs:
  review:
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Otto Review
        uses: ./
        with:
          dry-run: "true"
